name: Update Commodities dashboard

   on:
     schedule:
       - cron: "0 * * * *"
     workflow_dispatch:
     push:
       branches: [main]

   permissions:
     contents: read
     pages: write
     id-token: write

   concurrency:
     group: pages
     cancel-in-progress: true

   jobs:
     build-and-deploy:
       runs-on: ubuntu-latest
       environment:
         name: github-pages
         url: ${{ steps.deploy.outputs.page_url }}
       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
             python-version: "3.12"
         - name: Install deps
           run: pip install -r requirements.txt
         - name: Assemble site
           run: |
             mkdir -p site
             cp -r web/* site/
         - name: Collect market data
           run: python collector/collect.py --out site/market_data.json
         - uses: actions/configure-pages@v5
         - uses: actions/upload-pages-artifact@v3
           with:
             path: site
         - id: deploy
           uses: actions/deploy-pages@v4
